<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Monaco Editor Demo</title>
</head>

<body data-theme="light">
	<div id="header">
		<h1>Monaco Editor 示例</h1>
		<div class="controls">
			<div class="control-group">
				<label for="language-select">选择语言：</label>
				<select id="language-select">
					<option value="python">Python</option>
					<option value="cpp">C++</option>
					<option value="go">Go</option>
				</select>
			</div>
			<div class="control-group">
				<label for="theme-select">主题：</label>
				<select id="theme-select">
					<option value="vs">浅色</option>
					<option value="vs-dark">深色</option>
				</select>
			</div>
			<div class="control-group">
				<span id="lsp-status" class="lsp-status disconnected">LSP: 未连接</span>
				<label class="toggle-switch">
					<input type="checkbox" id="lsp-toggle" checked>
					<span class="toggle-slider"></span>
				</label>
			</div>
		</div>
	</div>
	<div id="container"></div>

	<script type="module" src="./main.js"></script>
</body>

</html>
