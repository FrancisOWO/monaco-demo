site_name: Monaco Editor Demo Wiki
site_description: Monaco Editor 示例项目文档，支持多语言 LSP、AI 补全、AI 聊天和 MCP 编辑器控制

nav:
  - Home: index.md
  - Getting Started:
      - Local Development: getting-started/local-dev.md
      - Configuration: getting-started/configuration.md
  - Architecture:
      - Overview: architecture/overview.md
      - Data Flow: architecture/data-flow.md
  - Components:
      - Monaco Editor: components/monaco-editor.md
      - LSP Server: components/lsp-server.md
      - WebSocket Handler: components/websocket-handler.md
      - AI Completion: components/ai-completion.md
      - AI Chat: components/ai-chat.md
      - MCP & Editor Control: components/mcp.md
      - File System: components/file-system.md
  - API:
      - Endpoints: api/endpoints.md
  - Operations:
      - Build & Test: operations/build-and-test.md
      - Deployment: operations/deploy.md
  - Glossary: glossary.md

theme:
  name: mkdocs
  highlightjs: true

markdown_extensions:
  - footnotes
  - toc:
      permalink: true
  - fenced_code
  - tables

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com
